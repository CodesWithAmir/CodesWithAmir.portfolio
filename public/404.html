<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Codes With Amir</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      h1 {
        font-size: 4rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.2rem;
        color: #aaa;
      }
      a {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.75rem 1.5rem;
        border: 1px solid #fff;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.3s;
      }
      a:hover {
        background-color: #fff;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>404</h1>
      <p>Oops! The page you're looking for doesn't exist.</p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
